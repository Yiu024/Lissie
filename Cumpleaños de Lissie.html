<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños Lissie!</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #1a082e 0%, #07010f 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Great Vibes', cursive;
        }
        .card-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 10;
        }
        .cake-wrapper {
            position: relative;
            width: 200px;
            height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }
        .candle {
            position: absolute;
            bottom: 75px;
            width: 12px;
            height: 50px;
            background: linear-gradient(45deg, #ff6b8b 25%, #ffffff 25%, #ffffff 50%, #ff6b8b 50%, #ff6b8b 75%, #ffffff 75%, #ffffff 100%);
            background-size: 15px 15px;
            border-radius: 3px 3px 0 0;
            z-index: 2;
        }
        .flame {
            position: absolute;
            bottom: 125px;
            background: #ffea00;
            width: 14px;
            height: 22px;
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 15px #ffea00, 0 0 30px #ff9800, 0 0 45px #ff5722;
            animation: flicker 1s ease-in-out infinite alternate;
            z-index: 3;
        }

        @keyframes flicker {
            0% { transform: scale(1) skewX(-2deg); box-shadow: 0 0 15px #ffea00, 0 0 30px #ff9800; }
            100% { transform: scale(1.15) skewX(3deg); box-shadow: 0 0 22px #ffea00, 0 0 45px #ff9800, 0 0 60px #ff5722; }
        }

        .cake {
            position: relative;
            width: 170px;
            height: 75px;
            background: #61381e;
            border-radius: 6px 6px 0 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            overflow: hidden;
            z-index: 1;
        }
        .cake::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 10px;
            background: #ff6b8b;
            top: 32px;
            left: 0;
        }
        .icing {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 18px;
            background: #ffffff;
        }
        .icing::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 12px;
            background: #ffffff;
            top: 14px;
            border-radius: 0 0 50% 50%;
            clip-path: polygon(0% 0%, 100% 0%, 100% 40%, 88% 90%, 75% 40%, 63% 100%, 50% 40%, 38% 90%, 25% 40%, 13% 100%, 0% 40%);
        }
        .plate {
            width: 210px;
            height: 6px;
            background: #ffffff;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            z-index: 1;
        }
        .birthday-text {
            font-size: 3.8rem;
            color: #ffffff;
            margin: 25px 0 0 0;
            text-shadow: 
                0 0 8px #ff6b8b,
                0 0 15px #ff6b8b,
                0 0 30px #ff6b8b,
                0 0 60px #ff2a55;
            animation: pulseText 2.5s infinite ease-in-out;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        @keyframes pulseText {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .background-dots {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }
	.dot {
   	 position: absolute;
    	animation: floatUp linear infinite;
    	user-select: none;
    	pointer-events: none;
	text-shadow:
        0 0 8px currentColor,
        0 0 15px currentColor,
        0 0 25px currentColor;
	}
        @keyframes floatUp {
            0% { transform: translateY(105vh) scale(0.4); opacity: 0; }
            30% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1.1); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="background-dots" id="dots"></div>
    <div class="card-container">
        <div class="cake-wrapper">
            <div class="flame"></div>
            <div class="candle"></div>
            <div class="cake">
                <div class="icing"></div>
            </div>
            <div class="plate"></div>
        </div>
        <h1 class="birthday-text">Happy Birthday Lissie</h1>
    </div>
    <!-- Si es que en algún momento llegas a leer esto Lissie, quiero que sepas lo mucho que te quiero y te estoy agarrando demasiado cariño, te vuelves muy especial para mí <3 -->
    <script>
        const dotsContainer = document.getElementById("dots");

const colors = [
    "#ff4d6d",
    "#ff6b8b",
    "#ff8fab",
    "#ffffff",
    "#ffb3c6",
    "#ffea00"
];

for (let i = 0; i < 40; i++) {
    const heart = document.createElement("div");
    heart.classList.add("dot");

    heart.innerHTML = "❤";

    const size = Math.random() * 18 + 12;
    heart.style.fontSize = `${size}px`;

    heart.style.left = `${Math.random() * 100}vw`;

    heart.style.color = colors[Math.floor(Math.random() * colors.length)];

    heart.style.animationDuration = `${Math.random() * 5 + 7}s`;
    heart.style.animationDelay = `${Math.random() * 8}s`;

    dotsContainer.appendChild(heart);
}
    </script>
</body>
</html>
